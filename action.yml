name: translint
description: Catch broken translations before they ship - missing keys, placeholder mismatches, empty and untranslated values.
author: Cole Munz
branding:
  icon: globe
  color: gray-dark

inputs:
  paths:
    description: Directory of locale files, or specific files, space-separated (e.g. "locales/" or "locales/en.json locales/de.json").
    required: true
  base:
    description: Locale name (filename stem) to treat as the reference.
    required: false
    default: "en"
  strict:
    description: Also fail on extra keys and untranslated-value heuristic hits, not just missing keys/placeholder mismatches/empty values.
    required: false
    default: "false"
  format:
    description: Force a format (json/po/properties) instead of detecting from extension.
    required: false
    default: ""
  python-version:
    description: Python version to run translint with.
    required: false
    default: "3.x"

runs:
  using: composite
  steps:
    - uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}
    - shell: bash
      env:
        TL_PATHS: ${{ inputs.paths }}
        TL_BASE: ${{ inputs.base }}
        TL_STRICT: ${{ inputs.strict }}
        TL_FORMAT: ${{ inputs.format }}
        TL_SCRIPT: ${{ github.action_path }}/translint.py
      run: |
        set -e
        args=(--base "$TL_BASE")
        if [ "$TL_STRICT" = "true" ]; then
          args+=(--strict)
        fi
        if [ -n "$TL_FORMAT" ]; then
          args+=(--format "$TL_FORMAT")
        fi
        # $TL_PATHS stays unquoted: the input is a space-separated list.
        python "$TL_SCRIPT" "${args[@]}" $TL_PATHS
